<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | The Cupons</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            min-height: calc(100vh - 68px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--gray-50) 50%, var(--accent-light) 100%);
        }

        .auth-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
        }

        .auth-card .auth-logo {
            display: block;
            width: 160px;
            margin: 0 auto 28px;
        }

        .auth-card h2 {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1.5px solid var(--gray-200);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: var(--gray-50);
            border: none;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-500);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-family: var(--font);
            font-size: 0.9rem;
            color: var(--gray-800);
            background: var(--gray-50);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 114, 188, 0.1);
        }

        .auth-error {
            background: #FEF2F2;
            color: #DC2626;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--gray-500);
        }

        .auth-links a {
            color: var(--primary);
            font-weight: 600;
        }

        .admin-hint {
            margin-top: 24px;
            padding: 12px;
            background: var(--accent-light);
            border-radius: var(--radius-md);
            font-size: 0.78rem;
            color: var(--gray-600);
            text-align: center;
            line-height: 1.5;
        }

        .admin-hint strong {
            color: var(--gray-800);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <img src="img/logo.svg" alt="The Cupons">
            </a>
            <nav class="header-nav" style="margin-left: auto;">
                <a href="index.html" class="nav-link">← Voltar ao Início</a>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <img src="img/logo.svg" alt="The Cupons" class="auth-logo">
            <h2 id="auth-title">Acesse sua conta</h2>
            <p class="subtitle" id="auth-subtitle">Entre para ver seus cupons e ofertas exclusivas.</p>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
                <button class="auth-tab" onclick="switchTab('cadastro')">Criar Conta</button>
            </div>

            <!-- Erro -->
            <div class="auth-error" id="auth-error"></div>

            <!-- Form Login -->
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
            </form>

            <!-- Form Cadastro -->
            <form id="form-cadastro" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nome completo</label>
                    <input type="text" id="reg-nome" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="reg-telefone" placeholder="(99) 99999-9999">
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <select id="reg-cidade">
                        <option value="Caxias-MA">Caxias — MA</option>
                        <option value="Teresina-PI">Teresina — PI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="reg-senha" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Criar Conta</button>
            </form>

            <div class="admin-hint">
                <strong>Acesso Gestor:</strong><br>
                admin@thecupons.com.br / admin123
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        // Verifica se já está logado
        const session = getSession();
        if (session) {
            window.location.href = session.tipo === 'admin' ? 'admin.html' : 'minha-conta.html';
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            const formLogin = document.getElementById('form-login');
            const formCadastro = document.getElementById('form-cadastro');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const error = document.getElementById('auth-error');
            error.style.display = 'none';

            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'login') {
                tabs[0].classList.add('active');
                formLogin.style.display = 'block';
                formCadastro.style.display = 'none';
                title.textContent = 'Acesse sua conta';
                subtitle.textContent = 'Entre para ver seus cupons e ofertas exclusivas.';
            } else {
                tabs[1].classList.add('active');
                formLogin.style.display = 'none';
                formCadastro.style.display = 'block';
                title.textContent = 'Crie sua conta';
                subtitle.textContent = 'Cadastre-se para começar a economizar.';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-senha').value;
            const error = document.getElementById('auth-error');

            const result = loginUser(email, senha);
            if (result.success) {
                window.location.href = result.tipo === 'admin' ? 'admin.html' : 'minha-conta.html';
            } else {
                error.textContent = 'E-mail ou senha incorretos.';
                error.style.display = 'block';
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const error = document.getElementById('auth-error');

            const dados = {
                nome: document.getElementById('reg-nome').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                senha: document.getElementById('reg-senha').value,
                telefone: document.getElementById('reg-telefone').value.trim(),
                cidade: document.getElementById('reg-cidade').value
            };

            const result = registerUser(dados);
            if (result.success) {
                window.location.href = 'minha-conta.html';
            } else {
                error.textContent = result.msg;
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
